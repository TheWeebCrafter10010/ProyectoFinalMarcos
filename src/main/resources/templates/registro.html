<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="contenedor">
    <div class="row justify-content-center">
        <div class="col-md-6 card mt-5 p-4 shadow-sm">
            <h3 class="text-center mb-4 fw-bold">Crear Cuenta</h3>

            <div th:if="${error}" class="alert alert-danger text-center">
                <span th:text="${error}">Error</span>
            </div>

            <form th:action="@{/usuarios/guardar}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej: Alonso Benito" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="Crea una password" required>
                </div>
                <button type="submit" class="btn btn-dark w-100">Registrarme</button>
                <div class="mt-3 text-center">
                    <a th:href="@{/usuarios/login}" class="text-decoration-none">Ya tengo cuenta, volver al login</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
