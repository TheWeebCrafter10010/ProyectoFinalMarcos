<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuestro Menú - Sabor y Tradición</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">

<h1 class="text-center mb-5">Carta del Restaurante</h1>

<h3 class="border-bottom pb-2">Entradas</h3>
<div class="row mb-4">
    <div class="col-md-4" th:each="p : ${platos}" th:if="${p.categoria.nombre == 'Entradas'}">
        <div class="d-flex justify-content-between border-bottom py-2">
            <span th:text="${p.nombre}">Plato</span>
            <span class="fw-bold" th:text="'S/ ' + ${p.precio}">0.00</span>
        </div>
    </div>
</div>

<h3 class="border-bottom pb-2">Platos de fondo</h3>
<div class="row mb-4">
    <div class="col-md-4" th:each="p : ${platos}" th:if="${p.categoria.nombre == 'Platos de Fondo'}">
        <div class="card mb-3">
            <div class="card-body">
                <h5 th:text="${p.nombre}">Plato</h5>
                <small th:text="${p.descripcion}" class="text-muted d-block mb-2">Desc</small>
                <span class="badge bg-success" th:text="'S/ ' + ${p.precio}">Precio</span>
            </div>
        </div>
    </div>
</div>

<h3 class="border-bottom pb-2">Postres</h3>
<div class="row">
    <div class="col-md-4" th:each="p : ${platos}" th:if="${p.categoria.nombre == 'Postres'}">
        <div class="text-center p-3 border rounded shadow-sm">
            <h6 th:text="${p.nombre}">Postre</h6>
            <p class="text-primary m-0" th:text="'S/ ' + ${p.precio}">Precio</p>
        </div>
    </div>
</div>

</body>
</html>
