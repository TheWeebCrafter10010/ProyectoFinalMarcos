<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body{
            background-color: #f8f9fa;
        }
        .card-login{
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-top: 100px;
        }
        .btn-primary{
            background-color: #d9534f;
            border: none;
        }
        .btn-primary:hover{
            background-color: #ec403a;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="row justify-content-center">
            <div class="col-md-4 card card-login p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Bienvenido</h3>
                    <p class="text-muted">Ingresa a tu cuenta de comensal</p>
                </div>

                <div th:if="${error}" class="alert alert-danger p-2 text-center" style="font-size: 0.9rem;">
                    <span th:text="${error}">Error</span>
                </div>

                <form th:action="@{/usuarios/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <!-- El name debe ser 'email' según tu @RequestParam -->
                        <input type="email" name="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="********" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    <div class="mt-3 text-center">
                        <span>¿No tienes cuenta? <a th:href="@{/usuarios/registro}">Regístrate aquí</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
